colourful: true

filekinds:
  normal: { foreground: "#FCFCFA" }
  directory: { foreground: "#AB9DF2", is_bold: true }
  symlink: { foreground: "#5FD7E8", is_italic: true }
  pipe: { foreground: "#78DCE8" }
  block_device: { foreground: "#FC9867", is_bold: true }
  char_device: { foreground: "#FC9867", is_bold: true }
  socket: { foreground: "#FF6188", is_bold: true }
  special: { foreground: "#FC9867" }
  executable: { foreground: "#A9DC76", is_bold: true }
  mount_point: { foreground: "#AB9DF2", is_bold: true, is_underline: true }

perms:
  user_read: { foreground: "#FFD866", is_bold: true }
  user_write: { foreground: "#FF6188", is_bold: true }
  user_execute_file:
    { foreground: "#A9DC76", is_bold: true, is_underline: true }
  user_execute_other: { foreground: "#A9DC76", is_bold: true }
  group_read: { foreground: "#FFD866" }
  group_write: { foreground: "#FF6188" }
  group_execute: { foreground: "#A9DC76" }
  other_read: { foreground: "#FFD866" }
  other_write: { foreground: "#FF6188" }
  other_execute: { foreground: "#A9DC76" }
  special_user_file: { foreground: "#AB9DF2" }
  special_other: { foreground: "#AB9DF2" }
  attribute: { foreground: "#939293" }

size:
  major: { foreground: "#A9DC76", is_bold: true }
  minor: { foreground: "#A9DC76" }
  number_byte: { foreground: "#A9DC76", is_bold: true }
  number_kilo: { foreground: "#A9DC76", is_bold: true }
  number_mega: { foreground: "#A9DC76", is_bold: true }
  number_giga: { foreground: "#A9DC76", is_bold: true }
  number_huge: { foreground: "#A9DC76", is_bold: true }
  unit_byte: { foreground: "#A9DC76" }
  unit_kilo: { foreground: "#A9DC76" }
  unit_mega: { foreground: "#A9DC76" }
  unit_giga: { foreground: "#A9DC76" }
  unit_huge: { foreground: "#A9DC76" }

users:
  user_you: { foreground: "#FFD866", is_bold: true }
  user_root: { foreground: "#FF6188", is_bold: true }
  user_other: { foreground: "#FCFCFA" }
  group_yours: { foreground: "#FFD866", is_bold: true }
  group_other: { foreground: "#FCFCFA" }
  group_root: { foreground: "#FF6188", is_bold: true }

links:
  normal: { foreground: "#FF6188", is_bold: true }
  multi_link_file: { foreground: "#FCFCFA", background: "#FF6188" }

git:
  new: { foreground: "#A9DC76" }
  modified: { foreground: "#78DCE8" }
  deleted: { foreground: "#FF6188" }
  renamed: { foreground: "#FFD866" }
  typechange: { foreground: "#AB9DF2" }
  ignored: { foreground: "#939293", is_dimmed: true }
  conflicted: { foreground: "#FC9867", is_bold: true }

git_repo:
  branch_main: { foreground: "#A9DC76" }
  branch_other: { foreground: "#FFD866" }
  git_clean: { foreground: "#A9DC76" }
  git_dirty: { foreground: "#FC9867" }

file_type:
  image: { foreground: "#AB9DF2" }
  video: { foreground: "#AB9DF2", is_bold: true }
  music: { foreground: "#78DCE8" }
  lossless: { foreground: "#78DCE8", is_bold: true }
  crypto: { foreground: "#A9DC76", is_bold: true }
  document: { foreground: "#78DCE8" }
  compressed: { foreground: "#FC9867" }
  temp: { foreground: "#939293" }
  compiled: { foreground: "#FC9867" }
  build: { foreground: "#FC9867", is_bold: true }
  source: { foreground: "#FFD866", is_bold: true }

punctuation: { foreground: "#939293", is_bold: true }
date: { foreground: "#5FD7E8" }
inode: { foreground: "#AB9DF2" }
blocks: { foreground: "#78DCE8" }
header: { foreground: "#FCFCFA", is_underline: true }
octal: { foreground: "#AB9DF2" }
flags: { foreground: "#939293" }

symlink_path: { foreground: "#5FD7E8", is_underline: true }
control_char: { foreground: "#FF6188" }
broken_symlink: { foreground: "#FF6188", is_bold: true }
broken_path_overlay: { foreground: "#FCFCFA", is_underline: true }

filenames: {}
extensions: {}
